services:
  app:
    container_name: together
    image: together:latest
    ports:
      - "2724:80"
    environment:
      APP_NAME: Together
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:2724
      DB_CONNECTION: mariadb
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DATABASE: together
      DB_USERNAME: laravel
      DB_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  db_data:
